<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="STEADYWRK">
  <rect width="512" height="512" rx="96" fill="#0A0A0A"/>
  <rect x="24" y="24" width="464" height="464" rx="80" fill="#121211"/>
  <!-- Amber glow ring -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="#E58A0F" stroke-width="2" opacity="0.2"/>
  <!-- Letter S -->
  <text
    x="256"
    y="330"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="260"
    fill="#E58A0F"
    filter="url(#glow)"
  >S</text>
  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
</svg>
